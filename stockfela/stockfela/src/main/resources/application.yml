# src/main/resources/application.yml
server:
  port: 8080

spring:
#  datasource:
#    url: jdbc:mysql://localhost:3306/stockfela_db
#    username: root
#    password: M@@nL1ght
#    driver-class-name: com.mysql.cj.jdbc.Driver


  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa                # Corrected from 'name'
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MySQL8Dialect <-- MUST be commented out for H2
        format_sql: true
  h2:
    console:
      enabled: true             # Corrected from 'enable'
      path: /h2-console
      settings:
        web-allow-others: true
  # To see SQL queries in console
sql:
  init:
    platform: mysql

  # Logging to see what's happening
logging:
  level:
    com.application.stockfela: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

  # Security (for OAuth2 if you add it later)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

# JWT Configuration
jwt:
  secret: mySuperSecretKeyThatIsVeryLongAndSecureForJWTTokenGeneration
  expiration: 86400000  # 24 hours in milliseconds

# Custom application settings
app:
  max-group-members: 20
  default-cycle-months: 12