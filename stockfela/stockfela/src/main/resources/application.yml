# ============================================================
# Stockfela – Application Configuration
#
# Secrets are read from environment variables.
# See /.env.example at the project root for all required vars.
# ============================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: stockfela

  # ── Database ──────────────────────────────────────────────
  # H2 in-memory database is used by default for local dev.
  # Switch to MySQL by setting the DB_* environment variables
  # and changing driver-class-name / database-platform below.
  datasource:
    url: ${DB_URL:jdbc:h2:mem:stockfeladb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    database-platform: ${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false          # set to true only when actively debugging SQL
    properties:
      hibernate:
        format_sql: true

  # ── H2 Console (dev only – disable in production) ─────────
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false   # never allow remote access to H2 console

  # ── OAuth2 (optional – remove block if not using Google login)
  # Uncomment and supply env vars to enable Google OAuth2:
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}

# ── JWT ───────────────────────────────────────────────────────
# Generate a strong secret: openssl rand -base64 64
# Set JWT_SECRET in your .env (never hardcode here).
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_use_a_real_base64_secret_in_env}
  expiration: ${JWT_EXPIRATION_MS:86400000}

# ── Application limits ────────────────────────────────────────
app:
  max-group-members: ${APP_MAX_GROUP_MEMBERS:20}
  default-cycle-months: ${APP_DEFAULT_CYCLE_MONTHS:12}

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.application.stockfela: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
