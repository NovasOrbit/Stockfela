# src/main/resources/application.yml
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stockfela_db
    username: root
    password: M@@nL1ght
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # In production, use 'validate' instead
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # To see SQL queries in console
sql:
  init:
    platform: mysql

  # Logging to see what's happening
logging:
  level:
    com.application.stockfela: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

  # Security (for OAuth2 if you add it later)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

# JWT Configuration
jwt:
  secret: mySuperSecretKeyThatIsVeryLongAndSecureForJWTTokenGeneration
  expiration: 86400000  # 24 hours in milliseconds

# Custom application settings
app:
  max-group-members: 20
  default-cycle-months: 12